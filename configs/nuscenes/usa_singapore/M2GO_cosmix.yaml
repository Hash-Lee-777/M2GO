MODEL_2D:
  TYPE: "UNetResNet34"
  DUAL_HEAD: True
  NUM_CLASSES: 6
MODEL_3D:
  TYPE: "SCN"
  DUAL_HEAD: True
  NUM_CLASSES: 6

DATASET_SOURCE:
  TYPE: "NuScenesSCN"
  TRAIN: ("train_day",)
  NuScenesSCN:
    preprocess_dir: "/work/sdim-lemons/jjch/3D_Openset_UDA/data/nuscenes_preprocess/preprocess"
    nuscenes_dir: "/work/sdim-lemons/jjch/3D_Openset_UDA_dev/data/NuScenes"  # only front cam images are needed
DATASET_TARGET:
  TYPE: "NuScenesSCN"
  TRAIN: ("train_night",)
  VAL: ("val_night",)
  TEST: ("test_night",)
  NuScenesSCN:
    preprocess_dir: "/work/sdim-lemons/jjch/3D_Openset_UDA/data/nuscenes_preprocess/preprocess"
    nuscenes_dir: "/work/sdim-lemons/jjch/3D_Openset_UDA_dev/data/NuScenes"  # only front cam images are needed

DATALOADER:
  NUM_WORKERS: 4

OPTIMIZER:
  TYPE: "Adam"
  BASE_LR: 0.001

SCHEDULER:
  TYPE: "MultiStepLR"
  MultiStepLR:
    gamma: 0.1
    milestones: (80000, 90000)
  MAX_ITERATION: 100000

TRAIN:
  BATCH_SIZE: 8
  SUMMARY_PERIOD: 50
  CHECKPOINT_PERIOD: 5000
  CLASS_WEIGHTS: [2.57, 4.24, 5.69, 3.84, 1.0, 1.0]
  XMUDA:
    lambda_xm_src: 1.0
    lambda_xm_trg: 0.1
    lambda_pl: 0.0
    PL_TO_UNK: {enable: false, thr: null, q: 0.2, q2d: null, q3d: null, thr2d: null, thr3d: null}

OPENSET:
  ENABLE: true                               
  UNKNOWN_CLASSES: ["bus", "construction_vehicle"]  
  UNK_SCORE: {alpha: 1.0, beta: 1.0, gamma: 1.0}    
  THRESHOLD: {type: quantile, q: 0.97}       
  GATE_XM: false                                
  GATE_PL: false                              
  GATE_MINENT: false                         
  WARMUP_ITERS: 1000                          
  LOG_HIST_EVERY: 500                         
  LAMBDA_UNK: 0.005
  UNK_RAMP_ITERS: 5000

VAL:
  BATCH_SIZE: 32
  PERIOD: 5000
  SAVE_VIZ: false
  VIZ_EVERY: 2
  VIZ_MAX: 200
  HEAD_UNKNOWN_THR_2D: 0.15
  HEAD_UNKNOWN_THR_3D: 0.05
  SGR_ENABLED: false

RESUME_PATH: ""
AUTO_RESUME: False

CONFIDENCE:
  ENABLE: true
  TYPE: fixed         # 可选: fixed | quantile
  TAU: 0.95         
  Q: 0.8          
  LOG_EVERY: 500

COSMIX:
  ENABLE: true
  REPLACE_XM: true    # 直接用混合教师替换原 XM；
  LAMBDA: 1.0
  GATE_BY_CONF: true  # α 由 2D/3D 置信度自适应

OUTPUT_DIR: "/work/sdim-lemons/jjch/3D_Openset_UDA_dev/m2go/output_cosmix/@"
