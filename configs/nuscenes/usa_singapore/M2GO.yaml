MODEL_2D:
  TYPE: "UNetResNet34"
  DUAL_HEAD: True
  NUM_CLASSES: 6

MODEL_3D:
  TYPE: "SCN"
  DUAL_HEAD: True
  NUM_CLASSES: 6

DATASET_SOURCE:
  TYPE: "NuScenesSCN"
  TRAIN: ("train_usa",)
  NuScenesSCN:
    preprocess_dir: "/work/sdim-lemons/jjch/3D_Openset_UDA/data/nuscenes_preprocess/preprocess"
    nuscenes_dir: "/work/sdim-lemons/jjch/3D_Openset_UDA_dev/data/NuScenes"  # only front cam images are needed

DATASET_TARGET:
  TYPE: "NuScenesSCN"
  TRAIN: ("train_singapore",)
  VAL: ("val_singapore",)
  TEST: ("test_singapore",)
  NuScenesSCN:
    preprocess_dir: "/work/sdim-lemons/jjch/3D_Openset_UDA/data/nuscenes_preprocess/preprocess"
    nuscenes_dir: "/work/sdim-lemons/jjch/3D_Openset_UDA_dev/data/NuScenes"  # only front cam images are needed

DATALOADER:
  NUM_WORKERS: 4

OPTIMIZER:
  TYPE: "Adam"
  BASE_LR: 0.001

SCHEDULER:
  TYPE: "MultiStepLR"
  MultiStepLR:
    gamma: 0.1
    milestones: (80000, 90000)
  MAX_ITERATION: 100000

TRAIN:
  BATCH_SIZE: 8
  SUMMARY_PERIOD: 50
  CHECKPOINT_PERIOD: 10000
  CLASS_WEIGHTS: [2.50, 4.23, 5.67, 3.82, 1.00, 1.00]
  XMUDA:
    lambda_xm_src: 1.0
    lambda_xm_trg: 0.1
    # Enable pseudo-label training with head-expansion logic
    lambda_pl: 0.0    # use PL on known candidates; small weight
    # Map low-confidence PL to Unknown (C+1) to supervise Unknown head
    # per-modality override supported: q2d/q3d or thr2d/thr3d
    PL_TO_UNK: {enable: false, thr: null, q: null, q2d: 0.05, q3d: 0.05, thr2d: null, thr3d: null}

OPENSET:
  ENABLE: true                       
  UNKNOWN_CLASSES: ["bus", "construction_vehicle"]  
  UNK_SCORE: {alpha: 1.0, beta: 1.0, gamma: 1.2}    
  THRESHOLD: {type: quantile, q: 0.99}       
  GATE_XM: false # Module A's on-off                            
  GATE_PL: false  # enable to utilize PL; high-U but not low-conf -> ignore                 
  GATE_MINENT: false                         
  WARMUP_ITERS: 10000                          
  LOG_HIST_EVERY: 500                         
  LAMBDA_UNK: 0.003 # small positive to reinforce Unknown head
  UNK_RAMP_ITERS: 5000 # linear ramp steps after warmup; 0 = disabled

VAL:
  BATCH_SIZE: 32
  PERIOD: 5000
  SAVE_VIZ: true    # save 2D overlay + p_unknown heat every VIZ_EVERY batches
  VIZ_EVERY: 2       
  VIZ_MAX: 200  
  HEAD_UNKNOWN_THR_2D: 0.2
  HEAD_UNKNOWN_THR_3D: 0.15
  SGR_ENABLED: false


RESUME_PATH: ""
AUTO_RESUME: False

OUTPUT_DIR: "/work/sdim-lemons/jjch/3D_Openset_UDA_dev/m2go/output/@"  #  @ will be replaced with config path, e.g. nuscenes/usa_singapore/xmuda