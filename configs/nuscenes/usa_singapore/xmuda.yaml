MODEL_2D:
  TYPE: "UNetResNet34"
  DUAL_HEAD: True

MODEL_3D:
  TYPE: "SCN"
  DUAL_HEAD: True

DATASET_SOURCE:
  TYPE: "NuScenesSCN"
  TRAIN: ("train_usa",)
  NuScenesSCN:
    preprocess_dir: "/home/Hash-Lee/paper3/3D_Openset_UDA/data/preprocess"
    nuscenes_dir: "/home/Hash-Lee/paper3/3D_Openset_UDA/data/nuscenes"  # only front cam images are needed

DATASET_TARGET:
  TYPE: "NuScenesSCN"
  TRAIN: ("train_singapore",)
  VAL: ("val_singapore",)
  TEST: ("test_singapore",)
  NuScenesSCN:
    preprocess_dir: "/home/Hash-Lee/paper3/3D_Openset_UDA/data/preprocess"
    nuscenes_dir: "/home/Hash-Lee/paper3/3D_Openset_UDA/data/nuscenes"  # only front cam images are needed

DATALOADER:
  NUM_WORKERS: 4

OPTIMIZER:
  TYPE: "Adam"
  BASE_LR: 0.001

SCHEDULER:
  TYPE: "MultiStepLR"
  MultiStepLR:
    gamma: 0.1
    milestones: (80000, 90000)
  MAX_ITERATION: 100000

TRAIN:
  BATCH_SIZE: 8
  SUMMARY_PERIOD: 50
  CHECKPOINT_PERIOD: 5000
  CLASS_WEIGHTS: [2.57, 4.24, 5.69, 3.84, 1.]
  XMUDA:
    lambda_xm_src: 1.0
    lambda_xm_trg: 0.1
    lambda_pl: 0.0        # do not use pseudo label, focus on pure UDA + Open-set

OPENSET:
  ENABLE: true                              
  UNKNOWN_CLASSES: ["bus", "construction_vehicle"]  
  UNK_SCORE: {alpha: 1.0, beta: 1.0, gamma: 1.0}    
  THRESHOLD: {type: quantile, q: 0.97}       
  GATE_XM: true                               
  GATE_PL: false                              
  GATE_MINENT: false                         
  WARMUP_ITERS: 1000                          
  LOG_HIST_EVERY: 500                         

VAL:
  BATCH_SIZE: 32
  PERIOD: 5000

RESUME_PATH: ""
AUTO_RESUME: False

OUTPUT_DIR: "/home/Hash-Lee/paper3/3D_Openset_UDA/output/@"  #  @ will be replaced with config path, e.g. nuscenes/usa_singapore/xmuda